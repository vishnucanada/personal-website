<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eceae1"/>
      <stop offset="1" stop-color="#f7f6f2"/>
    </linearGradient>
    <radialGradient id="glow1" cx="18%" cy="14%" r="55%">
      <stop offset="0" stop-color="#9eb7e5" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#9eb7e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="86%" cy="92%" r="55%">
      <stop offset="0" stop-color="#cdc392" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#cdc392" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- constellation motif echoing the hero canvas -->
  <g stroke="#648de5" stroke-opacity="0.22" stroke-width="1.2">
    <line x1="930" y1="120" x2="1050" y2="190"/>
    <line x1="1050" y1="190" x2="980" y2="300"/>
    <line x1="980" y1="300" x2="1090" y2="360"/>
    <line x1="930" y1="120" x2="980" y2="300"/>
    <line x1="1050" y1="190" x2="1130" y2="120"/>
    <line x1="980" y1="300" x2="900" y2="420"/>
    <line x1="1090" y1="360" x2="1140" y2="470"/>
    <line x1="900" y1="420" x2="1010" y2="480"/>
  </g>
  <g fill="#648de5" fill-opacity="0.55">
    <circle cx="930" cy="120" r="4"/>
    <circle cx="1050" cy="190" r="4"/>
    <circle cx="980" cy="300" r="4"/>
    <circle cx="1090" cy="360" r="4"/>
    <circle cx="1130" cy="120" r="4"/>
    <circle cx="900" cy="420" r="4"/>
    <circle cx="1140" cy="470" r="4"/>
    <circle cx="1010" cy="480" r="4"/>
  </g>

  <!-- accent rule -->
  <rect x="90" y="232" width="56" height="5" rx="2.5" fill="#648de5"/>

  <text x="88" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="#304c89" letter-spacing="-2">Vishnu Garigipati</text>
  <text x="92" y="392" font-family="monospace" font-size="34" fill="#4b5563">Machine Learning Engineer</text>

  <text x="92" y="552" font-family="monospace" font-size="24" fill="#6b7280">Montreal, Canada</text>
  <text x="92" y="588" font-family="monospace" font-size="22" fill="#648de5">github.com/vishnucanada</text>
</svg>
